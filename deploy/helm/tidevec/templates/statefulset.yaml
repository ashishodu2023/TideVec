apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tidevec.fullname" . }}
  labels:
    {{- include "tidevec.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "tidevec.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tidevec.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tidevec.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tidevec.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: tidevec
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6399
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "tidevec.fullname" . }}-config
          env:
            - name: TIDEVEC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tidevec.fullname" . }}-secret
                  key: api-key
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
