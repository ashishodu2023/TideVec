# ================================================================
# TideVec — Full stack docker-compose
# ================================================================

services:

  # ── TideVec CPU ────────────────────────────────────────────────
  tidevec:
    image: averm004/tidevec:latest
    container_name: tidevec
    restart: unless-stopped
    ports:
      - "6399:6399"
    volumes:
      - tidevec_data:/data
    environment:
      - TIDEVEC_THREADS=8
      - TIDEVEC_DEVICE=auto
      - TIDEVEC_REQUIRE_AUTH=1
      - TIDEVEC_ULTRA_DURABLE=1
      - TIDEVEC_SEGMENT_STORE=1
      - TIDEVEC_API_KEY=${TIDEVEC_API_KEY:-}
      - TIDEVEC_BACKUP=${TIDEVEC_BACKUP:-1}
      - TIDEVEC_BACKUP_DIR=/data/backups
      - TIDEVEC_OTEL_ENDPOINT=${TIDEVEC_OTEL_ENDPOINT:-http://jaeger:4318/v1/traces}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6399/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [tidevec_net]
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ── TLS reverse proxy (optional) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tidevec-nginx
    profiles: [tls]
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/tidevec.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [tidevec]
    networks: [tidevec_net]

  # ── TideVec GPU (optional) ─────────────────────────────────────
  tidevec-gpu:
    image: averm004/tidevec:gpu
    container_name: tidevec-gpu
    profiles: [gpu]
    restart: unless-stopped
    ports:
      - "6401:6399"
    volumes:
      - tidevec_gpu_data:/data
    environment:
      - TIDEVEC_THREADS=16
      - TIDEVEC_DEVICE=gpu
      - TIDEVEC_REQUIRE_AUTH=1
      - TIDEVEC_ULTRA_DURABLE=1
      - TIDEVEC_API_KEY=${TIDEVEC_API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [tidevec_net]

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tidevec-prometheus
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks: [tidevec_net]

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: tidevec-grafana
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on: [prometheus]
    networks: [tidevec_net]

  # ── Jaeger (OTel tracing) ────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: tidevec-jaeger
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks: [tidevec_net]

volumes:
  tidevec_data:
  tidevec_gpu_data:
  prometheus_data:
  grafana_data:

networks:
  tidevec_net:
    driver: bridge
