# ================================================================
# Docker Hub publish workflow
#
# Publishes to:
#   averm004/tidevec:latest      (CPU, multi-arch)
#   averm004/tidevec:cpu         (CPU, multi-arch)
#   averm004/tidevec:gpu         (GPU, amd64 — main + v* tags)
#   averm004/tidevec:tpu         (TPU, amd64 — main + v* tags)
#
# Required GitHub Secrets:
#   DOCKER_USERNAME = averm004
#   DOCKER_PASSWORD = dckr_pat_xxxx  (Docker Hub access token)
# ================================================================

name: Docker Hub

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_REPO: averm004/tidevec

jobs:

  # ── CPU (multi-arch: amd64 + arm64) ───────────────────────────
  build-cpu:
    name: Build CPU (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=cpu,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},suffix=-cpu
            type=semver,pattern={{major}}.{{minor}},suffix=-cpu
            type=sha,prefix=sha-,suffix=-cpu

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       docker/cpu/Dockerfile
          platforms:  ${{ matrix.platform }}
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=cpu-${{ matrix.platform }}
          cache-to:   type=gha,scope=cpu-${{ matrix.platform }},mode=max

  # ── GPU (amd64) — main + version tags ─────────────────────────
  build-gpu:
    name: Build GPU (amd64)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=gpu,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},suffix=-gpu
            type=semver,pattern={{major}}.{{minor}},suffix=-gpu
            type=sha,prefix=sha-,suffix=-gpu

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       docker/gpu/Dockerfile
          platforms:  linux/amd64
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_ARCH=80;86;89;90
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=gpu
          cache-to:   type=gha,scope=gpu,mode=max

  # ── TPU (amd64) — main + version tags ─────────────────────────
  build-tpu:
    name: Build TPU (amd64)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=tpu,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},suffix=-tpu
            type=semver,pattern={{major}}.{{minor}},suffix=-tpu
            type=sha,prefix=sha-,suffix=-tpu

      - name: Build and push TPU image
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       docker/tpu/Dockerfile
          platforms:  linux/amd64
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=tpu
          cache-to:   type=gha,scope=tpu,mode=max

  # ── Docker Hub README update ────────────────────────────────────
  update-readme:
    name: Update Docker Hub README
    runs-on: ubuntu-latest
    needs: [build-cpu]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username:         ${{ secrets.DOCKER_USERNAME }}
          password:         ${{ secrets.DOCKER_PASSWORD }}
          repository:       ${{ env.DOCKERHUB_REPO }}
          readme-filepath:  ./docker/DOCKERHUB_README.md
          short-description: "CortexDB / TideVec — temporally-aware causal vector DB (CPU, GPU, TPU)"

  # ── Security scan ───────────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-cpu]
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
      actions:         read
      contents:        read
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref:  .
          severity:  CRITICAL,HIGH
          format:    sarif
          output:    trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
